server {
    listen 8080;
    client_max_body_size 50;

    location / {
        root ./sources/www;
        methods POST GET;
        autoindex on;
        index index.html;
        error_page 404 404.html;
        error_page 504 504.html;

        cgi_pass .sh /usr/bin/bash;
    }

  location upload/ {
        root sources/www/;
        autoindex on;
        methods GET POST DELETE;
        cgi_pass .py /usr/bin/python3;
    }

  location cgi-bin {
    root sources/www/;
    methods POST GET;
        autoindex on;

    cgi_pass .py /usr/bin/python3;
    cgi_pass .php /usr/bin/php-cgi;

  }

  location repo {
    root sources/www/;
    autoindex off;
    methods GET;
  }

}
