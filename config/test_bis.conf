server {
	listen 8080;
	# listen 8080;
	listen 69.69.69.69;


	location / {
		root ./sources/www;
		methods GET;
		# POST --> 405
		# PROUT --> 400
		# ALLOW --> 400
		index index.html;
		error_page 404 /errors/404.html;
		autoindex on;

	}

}

server {
	listen 8000; #attention gerer le atoi
	client_max_body_size 80;
	client_max_body_size 28;


	location / {
		root /sources/www ;
		methods DELETE GET POST;
		autoindex on;
		index index.html;

	}
	location /upload {
		root ./www;
		methods POST GET GET POST;
		upload_loc ici ;
		upload_enable on;
		redirect 301 ici;
		# redirect 302 la;
		# redirect 301 enfaitla;
		# redirect 303 la;
		error_page 404 /errors/404.html;
		error_page 500 502 503 504 "/errors/50x.html";
		error_page 404 /errors/405.html;
		cgi_pass blabla;
	}
	# location / { } # ca va tout ecrire par dessus le KEY=/ preexistant donc on se retrouve avec un LocationConfig "vide"/du constructeur par defaut
}

server {
	listen 8181;

	location / {
		root sources/www ;
		methods DELETE GET POST;
		autoindex on;
		index index.html;
		}
}




