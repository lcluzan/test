server {
	listen 8080;

	location /  {
		root /var/www/html;
		index index.html;
	}
}

server {
    listen 9292;
    server_name werbserv.fr;

    location / {
    root ./www;
	allow_methods GET POST DELETE;
    autoindex on;
    }
    location /upload {
    root ./www;
		allow_methods GET DELETE POST;
		location /random {
			random_rule 55;
			useless_rule 66;
		}
    }
}


