server {
	listen 8080;

	location / { # on peut mettre combien d'arguments/parametres dans la directive location ?
		root sources/www;
		methods GET;
    autoindex on;
		index /index.html;
		error_page 404 404.html;
	}

  location upload/ { # on peut mettre combien d'arguments/parametres dans la directive location ?
		root sources/www;
		methods POST DELETE;
		cgi_pass .py /usr/bin/python3;
	}

  location cgi-bin {
	root sources/www;
	methods GET POST;
	cgi_pass .py /usr/bin/python3;
	cgi_pass .php /usr/bin/php-cgi;
	cgi_pass .sh /usr/bin/bash;
  }

}

server {
	listen 9292;

	location / { # on peut mettre combien d'arguments/parametres dans la directive location ?
		root sources/www;
		methods GET ;
		index index.html;
		error_page 404 404.html;
	}

  location upload/ { # on peut mettre combien d'arguments/parametres dans la directive location ?
		root sources/www;
		methods POST;
		autoindex on;
		index HelloWord.html;
		error_page 404 404.html;
	}


}

