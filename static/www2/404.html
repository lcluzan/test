<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page non trouvée</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            font-size: 120px;
            color: #4a90e2;
            margin: 0;
            line-height: 1;
        }
        h2 {
            font-size: 24px;
            margin: 10px 0;
            color: #555;
        }
        p {
            font-size: 16px;
            color: #777;
            margin: 20px 0;
        }
        .button {
            display: inline-block;
            background-color: #4a90e2;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #3a7bc8;
        }
        .path {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 3px;
            color: #555;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oups ! Page non trouvée</h2>
        <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
        <div class="path">Chemin demandé : <span id="requested-path">/chemin/invalide</span></div>
        <a href="/" class="button">Retour à l'accueil</a>
    </div>

    <script>
        // Récupérer le chemin demandé depuis l'URL (pour affichage dynamique)
        document.getElementById('requested-path').textContent = window.location.pathname;
    </script>
</body>
</html>
