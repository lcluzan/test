<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - webServ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 60px;
            color: #4a90e2;
            margin: 0;
            line-height: 1;
        }
        h2 {
            font-size: 20px;
            margin: 10px 0;
            color: #555;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        input[type="submit"]:hover {
            background-color: #3a7bc8;
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: left;
        }
        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }
        .forgot-password a {
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .path {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 3px;
            color: #555;
            font-size: 14px;
            margin-top: 20px;
        }
 .button {
            display: inline-block;
            background-color: #4a90e2;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #3a7bc8;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>webServ</h1>
        <h2>Connectez-vous</h2>
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="forgot-password">
                <a href="/forgot-password">Mot de passe oublié ?</a>
            </div>
            
            <div class="form-group">
              <a href="log-error.html" class="button">Se conecter</a>
            </div>
            <!--div class="form-group">
                <input type="submit" value="Se connecter">
            </div-->
        </form>
        
        <div id="error-message" class="error-message"></div>
        <div class="path">Chemin actuel : <span id="current-path">/login</span></div>
    </div>

    <script>
        // Afficher le chemin actuel
        document.getElementById('current-path').textContent = window.location.pathname;
        
        // Gestion des erreurs (exemple : si l'URL contient un paramètre d'erreur)
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error === '1') {
            document.getElementById('error-message').textContent = "Nom d'utilisateur ou mot de passe incorrect.";
        }
    </script>
</body>
</html>
