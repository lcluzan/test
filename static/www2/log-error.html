<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur de connexion - webServ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 80px;
            color: #e74c3c;
            margin: 0;
            line-height: 1;
        }
        h2 {
            font-size: 24px;
            margin: 10px 0;
            color: #555;
        }
        .error-message {
            font-size: 16px;
            color: #777;
            margin: 20px 0;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .button-login {
            background-color: #4a90e2;
            color: white;
        }
        .button-login:hover {
            background-color: #3a7bc8;
        }
        .button-visitor {
            background-color: #95a5a6;
            color: white;
        }
        .button-visitor:hover {
            background-color: #7f8c8d;
        }
        .path {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 3px;
            color: #555;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️</h1>
        <h2>Échec de connexion</h2>
        
        <p class="error-message">
            Nom d'utilisateur ou mot de passe incorrect. Veuillez réessayer.
        </p>

        <div class="button-container">
            <a href="login.html" class="button button-login">Retour à la connexion</a>
            <a href="storage.html" class="button button-visitor">Continuer en tant qu'invité</a>
        </div>

        <div class="path">Chemin actuel : <span id="current-path">/error</span></div>
    </div>

    <script>
        // Afficher le chemin actuel
        document.getElementById('current-path').textContent = window.location.pathname;
    </script>
</body>
</html>
