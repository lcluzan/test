<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page non trouvée | WebServer 42</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .error-container {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .error-code {
            font-size: 10rem;
            color: #4CAF50;
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0;
            color: #555;
        }
        .error-details {
            font-size: 1rem;
            color: #777;
            margin-bottom: 2rem;
        }
        .back-button {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <main>
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <h2 class="error-message">Oups ! Page non trouvée</h2>
            <p class="error-details">
                La page que vous cherchez n'existe pas ou a été déplacée.
            </p>
            <a href="index.html" class="back-button">Retour à l'accueil</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 - Mon WebServer 42</p>
    </footer>
</body>
</html>
