<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Utilisateur - webServ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 800px;
            width: 90%;
        }
        h1 {
            font-size: 60px;
            color: #4a90e2;
            margin: 0;
            line-height: 1;
        }
        h2 {
            font-size: 20px;
            margin: 10px 0;
            color: #555;
        }
        p {
            font-size: 16px;
            color: #777;
            margin: 20px 0;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .button {
            background-color: #4a90e2;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
            flex: 1;
            max-width: 200px;
        }
        .button:hover {
            background-color: #3a7bc8;
        }
        .path {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 3px;
            color: #555;
            font-size: 14px;
            margin-top: 20px;
        }
        .non-user-message {
            font-style: italic;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>webServ</h1>
        <h2>Bienvenue sur notre plateforme</h2>
        
        <p class="non-user-message">
            Vous n'êtes pas connecté ? Explorez nos fonctionnalités en tant qu'invité.
        </p>

        <p>Choisissez une option pour continuer :</p>

        <div class="button-container">
            <a href="/form" class="button">Formulaire</a>
            <a href="/storage" class="button">Stockage</a>
            <a href="/game" class="button">Jeu</a>
        </div>

        <div class="path">Chemin actuel : <span id="current-path">/userhome</span></div>
    </div>

    <script>
        // Afficher le chemin actuel
        document.getElementById('current-path').textContent = window.location.pathname;
    </script>
</body>
</html>
